name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          # Trust auth so the non-superuser app_user (no password) can connect,
          # exactly like the local test cluster.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGPORT: '5432'
      DATABASE_URL_MAINT: postgres://postgres@127.0.0.1:5432/postgres
      DATABASE_URL_ADMIN: postgres://postgres@127.0.0.1:5432/eventreg_test
      DATABASE_URL_APP: postgres://app_user@127.0.0.1:5432/eventreg_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm test
