name: live-probe
on:
  workflow_dispatch:
  push:
    branches: [claude/live-probe]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Verify eventreg production after phases A-D + DB migration
        run: |
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          BASE="https://eventreg-eosin.vercel.app"

          echo "::group::index"
          curl -sS -L --max-time 30 -A "$UA" "$BASE/" -o index.html -w "HTTP %{http_code}\n"
          grep -oE '(src|href)="[^"]+"' index.html | sort -u
          echo "::endgroup::"

          echo "::group::service worker (offline shell)"
          curl -sS -L --max-time 30 -A "$UA" "$BASE/sw.js" -w "\nHTTP %{http_code}\n" | head -c 600
          echo "::endgroup::"

          echo "::group::entry bundle contains phase-D config layer"
          JS=$(grep -oE 'src="[^"]+\.js"' index.html | cut -d'"' -f2 | head -1)
          case "$JS" in http*) URL="$JS";; *) URL="$BASE$JS";; esac
          curl -sS -L --max-time 60 -A "$UA" "$URL" -o bundle.js -w "HTTP %{http_code}, bytes: %{size_download}\n"
          echo "config markers:"
          grep -oE 'eventreg-config-v1|/api/event-config|eventreg-door|/api/scan-batch|station=scan|EventSetup' bundle.js | sort | uniq -c
          echo "::endgroup::"

          echo "::group::GET /api/event-config (public, proves DB migration)"
          curl -sS --max-time 30 -A "$UA" "$BASE/api/event-config" -w "\nHTTP %{http_code}\n"
          echo "::endgroup::"

          echo "::group::GET /api/ticket?token=bogus (expect 404)"
          curl -sS --max-time 30 -A "$UA" "$BASE/api/ticket?token=bogus-probe-token" -w "\nHTTP %{http_code}\n"
          echo "::endgroup::"

          echo "::group::wallet probes (200 = configured, 503 = env not set yet)"
          curl -sS --max-time 30 -A "$UA" "$BASE/api/wallet-pass?probe=1" -w "\nHTTP %{http_code}\n"
          curl -sS --max-time 30 -A "$UA" "$BASE/api/google-wallet?probe=1" -w "\nHTTP %{http_code}\n"
          echo "::endgroup::"

          echo "::group::auth gates (expect 401 without organizer key)"
          curl -sS --max-time 30 -A "$UA" -X POST -H "Content-Type: application/json" -d '{"token":"x"}' "$BASE/api/scan" -w "\nHTTP %{http_code}\n"
          curl -sS --max-time 30 -A "$UA" -X POST -H "Content-Type: application/json" -d '{"scans":[]}' "$BASE/api/scan-batch" -w "\nHTTP %{http_code}\n"
          curl -sS --max-time 30 -A "$UA" "$BASE/api/registrants" -w "\nHTTP %{http_code}\n"
          echo "::endgroup::"
